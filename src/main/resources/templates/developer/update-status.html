<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Bug Status</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/developer-style.css}">
</head>

<body>

<!-- ✅ NAVBAR -->
<div th:replace="~{developer/developer-layout :: navbar}"></div>

<!-- ✅ SIDEBAR -->
<div th:replace="~{developer/developer-layout :: sidebar}"></div>

<!-- ✅ CONTENT -->
<div class="content">

    <!-- PAGE TITLE -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-semibold">Update Bug Status</h3>
    </div>

    <!-- CARD -->
    <div class="card shadow-lg p-4">

        <!-- BUG DETAILS -->
        <h5 class="mb-3">Bug Details</h5>

        <p><b>ID:</b> <span th:text="${bug.id}"></span></p>
        <p><b>Title:</b> <span th:text="${bug.title}"></span></p>
        <p><b>Description:</b> <span th:text="${bug.description}"></span></p>

        <p>
            <b>Priority:</b>
            <span th:if="${bug.priority=='CRITICAL'}" class="badge priority-critical">CRITICAL</span>
            <span th:if="${bug.priority=='HIGH'}" class="badge priority-high">HIGH</span>
            <span th:if="${bug.priority=='MEDIUM'}" class="badge priority-medium">MEDIUM</span>
            <span th:if="${bug.priority=='LOW'}" class="badge priority-low">LOW</span>
        </p>

        <p>
            <b>Current Status:</b>
            <span class="badge bg-warning" th:if="${bug.status=='OPEN'}">OPEN</span>
            <span class="badge bg-primary" th:if="${bug.status=='IN_PROGRESS'}">IN_PROGRESS</span>
            <span class="badge bg-success" th:if="${bug.status=='RESOLVED'}">RESOLVED</span>
            <span class="badge bg-dark" th:if="${bug.status=='CLOSED'}">CLOSED</span>
        </p>

        <hr>

        <!-- FORM -->
        <form th:action="@{/developer/update-status}" method="post">

            <input type="hidden" name="id" th:value="${bug.id}">

            <div class="mb-3">
                <label class="form-label">Change Status</label>

                <select name="status" class="form-select" required>
                    <option value="">-- Select Status --</option>
                    
                     <option value="OPEN"
                            th:selected="${bug.status=='OPEN'}">
                        OPEN
                    </option>

                    <option value="IN_PROGRESS"
                            th:selected="${bug.status=='IN_PROGRESS'}">
                        IN_PROGRESS
                    </option>

                    <option value="RESOLVED"
                            th:selected="${bug.status=='RESOLVED'}">
                        RESOLVED
                    </option>
                </select>
            </div>

            <!-- BUTTONS -->
            <div class="d-flex gap-2">

                <button class="btn btn-outline-light">
                    <i class="bi bi-check-circle"></i> Update Status
                </button>

                <a href="/developer/dashboard" class="btn btn-outline-light">
                    Back
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
