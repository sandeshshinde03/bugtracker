<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>In Progress Bugs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/developer-style.css}">
</head>

<body>

<!-- ✅ NAVBAR -->
<div th:replace="~{developer/developer-layout :: navbar}"></div>

<!-- ✅ SIDEBAR -->
<div th:replace="~{developer/developer-layout :: sidebar}"></div>

<!-- ✅ CONTENT -->
<div class="content">

    <!-- PAGE TITLE -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-semibold">In Progress Bugs</h3>
    </div>

    <!-- TABLE CARD -->
    <div class="card shadow-lg">

        <div class="card-header">
            <i class="bi bi-tools me-2"></i> Bugs Currently In Progress
        </div>

        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="bug : ${bugs}"
                    th:onclick="'window.location.href=\'/developer/bug/' + ${bug.id} + '\''"
                    style="cursor:pointer;">

                    <td th:text="${bug.id}"></td>
                    <td th:text="${bug.title}"></td>
                    <td th:text="${bug.description}"></td>

                    <!-- PRIORITY -->
                    <td>
                        <span th:if="${bug.priority=='CRITICAL'}" class="badge priority-critical">CRITICAL</span>
                        <span th:if="${bug.priority=='HIGH'}" class="badge priority-high">HIGH</span>
                        <span th:if="${bug.priority=='MEDIUM'}" class="badge priority-medium">MEDIUM</span>
                        <span th:if="${bug.priority=='LOW'}" class="badge priority-low">LOW</span>
                    </td>

                    <!-- STATUS -->
                    <td>
                        <span class="badge bg-primary">IN_PROGRESS</span>
                    </td>

                    <!-- ACTION -->
                    <td>
                        <a th:href="@{'/developer/update-status/' + ${bug.id}}"
                           class="btn btn-sm btn-outline-light"
                           onclick="event.stopPropagation();">
                            <i class="bi bi-pencil-square"></i> Update
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
