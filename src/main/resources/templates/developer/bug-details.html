<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bug Details - Developer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/developer-style.css}">
</head>

<body>

<!-- ✅ NAVBAR -->
<div th:replace="~{developer/developer-layout :: navbar}"></div>

<!-- ✅ SIDEBAR -->
<div th:replace="~{developer/developer-layout :: sidebar}"></div>

<!-- ✅ CONTENT -->
<div class="content">

    <!-- BUG DETAILS -->
    <div class="card p-4 mb-4 shadow">

        <h3 th:text="${bug.title}">Bug Title</h3>

        <p class="text-white" th:text="${bug.description}"></p>

        <div class="row mt-3">

            <!-- STATUS -->
            <div class="col-md-3">
                <b>Status:</b><br>
                <span th:if="${bug.status=='OPEN'}" class="badge bg-warning">OPEN</span>
                <span th:if="${bug.status=='IN_PROGRESS'}" class="badge bg-primary">IN_PROGRESS</span>
                <span th:if="${bug.status=='RESOLVED'}" class="badge bg-success">RESOLVED</span>
                <span th:if="${bug.status=='CLOSED'}" class="badge bg-secondary">CLOSED</span>
            </div>

            <!-- PRIORITY -->
            <div class="col-md-3">
                <b>Priority:</b><br>
                <span th:if="${bug.priority=='CRITICAL'}" class="badge priority-critical">CRITICAL</span>
                <span th:if="${bug.priority=='HIGH'}" class="badge priority-high">HIGH</span>
                <span th:if="${bug.priority=='MEDIUM'}" class="badge priority-medium">MEDIUM</span>
                <span th:if="${bug.priority=='LOW'}" class="badge priority-low">LOW</span>
            </div>

            <!-- PROJECT -->
            <div class="col-md-3">
                <b>Project:</b><br>
                <span th:text="${bug.project != null ? bug.project.name : 'No Project'}"></span>
            </div>

            <!-- REPORTER -->
            <div class="col-md-3">
                <b>Reported By:</b><br>
                <span th:text="${bug.reporter != null ? bug.reporter.name : 'Unknown'}"></span>
            </div>

        </div>

        <!-- EXTRA INFO -->
        <div class="row mt-3">
            <div class="col-md-3">
                <b>Assigned Developer:</b><br>
                <span th:text="${bug.assignedDeveloper != null ? bug.assignedDeveloper.name : 'Unassigned'}"></span>
            </div>
        </div>

        <div class="mt-3">
            <b>Created:</b>
            <span th:text="${#temporals.format(bug.createdDate, 'dd MMM yyyy HH:mm')}"></span>
        </div>

    </div>

    <!-- COMMENTS -->
    <div class="card mt-4">

        <div class="card-header">
            <h5 class="mb-0">Comments</h5>
        </div>

        <div class="card-body">

            <div th:if="${#lists.isEmpty(comments)}" class="text-light">
                No comments yet 💬
            </div>

            <div th:each="c : ${comments}" class="mb-3 p-3"
                 style="background:rgba(255,255,255,0.03); border-radius:10px; border:1px solid rgba(255,255,255,0.05);">

                <b class="text-white" th:text="${c.user.name}">User</b>

                <!-- ✅ FIXED -->
                <small class="text-secondary ms-2"
                       th:text="${#temporals.format(c.createdDate, 'dd MMM yyyy HH:mm')}"></small>

                <div class="mt-1 text-light" th:text="${c.message}"></div>
            </div>

            <form th:action="@{'/tester/bug/' + ${bug.id} + '/comment'}" method="post" class="mt-3">

                <div class="input-group">

                    <input type="text"
                           name="message"
                           class="form-control"
                           placeholder="Add a comment..."
                           required>

                    <button class="btn btn-glow">
                        <i class="bi bi-send"></i>
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
