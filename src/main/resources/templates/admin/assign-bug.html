<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Assign Bug</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ADMIN CSS -->
<link th:href="@{/css/admin-style.css}" rel="stylesheet">

</head>


<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

<div class="container-fluid">

<span class="navbar-brand">
🐞 Bug Tracking System - Admin
</span>

<a th:href="@{/logout}" class="btn btn-outline-light btn-sm">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

</nav>



<!-- SIDEBAR -->

<div class="sidebar">

<h4 class="text-center mt-2">Admin Panel</h4>
<hr>

    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Manage Users</a>
    <a th:href="@{/admin/projects}"><i class="bi bi-kanban"></i> Projects</a>
    <a th:href="@{/admin/bugs}"><i class="bi bi-bug"></i> All Bugs</a>
    <a th:href="@{/admin/assign}"><i class="bi bi-person-check"></i> Assign Bugs</a>
    <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>

</div>



<!-- MAIN CONTENT -->

<div class="content">

<h2 class="mb-4 fw-semibold">
<i class="bi bi-person-check"></i> Assign Bug to Developer
</h2>


<div class="card form-card">

<div class="form-header">
Bug Assignment
</div>

<div class="card-body">

<form th:action="@{/admin/assign}" method="post">


<!-- BUG SELECTION -->

<div class="mb-3">

<label class="form-label">Select Bug</label>

<select name="bugId" class="form-control" required>

<option value="">Select Bug</option>

<option th:each="bug : ${bugs}"
        th:value="${bug.id}"
        th:text="${bug.title}">
</option>

</select>

</div>


<!-- DEVELOPER SELECTION -->

<div class="mb-4">

<label class="form-label">Assign Developer</label>

<select name="developerId" class="form-control" required>

<option value="">Select Developer</option>

<option th:each="dev : ${developers}"
        th:value="${dev.id}"
        th:text="${dev.name}">
</option>

</select>

</div>


<div class="d-grid">

<button type="submit" class="btn btn-main">

<i class="bi bi-check-circle"></i> Assign Bug

</button>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
