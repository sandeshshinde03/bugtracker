<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Manage Users</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- ADMIN CSS -->
<link th:href="@{/css/admin-style.css}" rel="stylesheet">
</head>


<body>

<!-- NAVBAR (SAME AS DASHBOARD) -->

<nav class="navbar navbar-dark">
    <div class="container-fluid">

        <span class="navbar-brand">
            🐞 Bug Tracking System - Admin
        </span>

        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>
</nav>


<!-- SIDEBAR (SAME AS DASHBOARD) -->

<div class="sidebar">

    <h4 class="text-center mt-2">Admin Panel</h4>
    <hr>

    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Manage Users</a>
    <a th:href="@{/admin/projects}"><i class="bi bi-kanban"></i> Projects</a>
    <a th:href="@{/admin/bugs}"><i class="bi bi-bug"></i> All Bugs</a>
    <a th:href="@{/admin/assign}"><i class="bi bi-person-check"></i> Assign Bugs</a>
    <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>

</div>


<!-- MAIN CONTENT -->

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-semibold">
<i class="bi bi-people"></i> Manage Users
</h2>

<a th:href="@{/admin/users/add}" class="btn btn-primary">
<i class="bi bi-person-plus"></i> Add User
</a>

</div>


<div class="card shadow">

<div class="card-body">

<table class="table table-hover table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Actions</th>
</tr>

</thead>


<tbody>

<tr th:each="user : ${users}">

<td th:text="${user.id}"></td>

<td th:text="${user.name}"></td>

<td th:text="${user.email}"></td>

<td>
<span class="badge bg-info"
      th:text="${user.role}">
</span>
</td>

<td>

<a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
   class="btn btn-sm btn-danger">

<i class="bi bi-trash"></i> Delete

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


</body>
</html>
