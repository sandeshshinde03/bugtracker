<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- this page is not use -->
<head>
    <title>View Bug</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

	<!-- ADMIN CSS -->
	<link th:href="@{/css/admin-style.css}" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            🐞 Bug Tracking System - Admin
        </span>

        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mt-2">Admin Panel</h4>
    <hr>

    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Manage Users</a>
    <a th:href="@{/admin/projects}"><i class="bi bi-kanban"></i> Projects</a>
    <a th:href="@{/admin/bugs}"><i class="bi bi-bug"></i> All Bugs</a>
    <a th:href="@{/admin/assign}"><i class="bi bi-person-check"></i> Assign Bugs</a>
    <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <h2 class="mb-4 fw-semibold">
        <i class="bi bi-eye"></i> Bug Details
    </h2>

    <!-- If bug is NULL -->
    <div th:if="${bug == null}" class="alert alert-danger">
        Bug not found!
    </div>

    <!-- BUG CARD -->
    <div class="card bug-card" th:if="${bug != null}">

        <div class="card-header p-3">
            Bug Information
        </div>

        <div class="card-body">

            <div class="detail-row">
                <span class="detail-title">ID :</span>
                <span th:text="${bug.id != null ? bug.id : 'N/A'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Title :</span>
                <span th:text="${bug.title != null ? bug.title : 'N/A'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Description :</span>
                <span th:text="${bug.description != null ? bug.description : 'N/A'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Project :</span>
                <span th:text="${bug.project != null ? bug.project.name : 'Unknown'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Reporter :</span>
                <span th:text="${bug.reporter != null ? bug.reporter.name : 'Unknown'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Developer :</span>
                <span th:text="${bug.assignedDeveloper != null ? bug.assignedDeveloper.name : 'Unassigned'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Priority :</span>
                <span th:text="${bug.priority != null ? bug.priority : 'N/A'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Status :</span>
                <span th:text="${bug.status != null ? bug.status : 'N/A'}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-title">Created :</span>
                <span th:text="${bug.createdDate != null ? #temporals.format(bug.createdDate,'yyyy-MM-dd HH:mm') : 'N/A'}"></span>
            </div>

            <div class="mt-4">
                <a th:href="@{/admin/bugs}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
