<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Bug Reports</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ADMIN CSS -->
<link th:href="@{/css/admin-style.css}" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

<div class="container-fluid">

<span class="navbar-brand">
🐞 Bug Tracking System - Admin
</span>

<a th:href="@{/logout}" class="btn btn-outline-light btn-sm">
<i class="bi bi-box-arrow-right"></i> Logout
</a>

</div>

</nav>



<!-- SIDEBAR -->

<div class="sidebar">

<h4 class="text-center mt-2">Admin Panel</h4>
<hr>

    <a th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Manage Users</a>
    <a th:href="@{/admin/projects}"><i class="bi bi-kanban"></i> Projects</a>
    <a th:href="@{/admin/bugs}"><i class="bi bi-bug"></i> All Bugs</a>
    <a th:href="@{/admin/assign}"><i class="bi bi-person-check"></i> Assign Bugs</a>
    <a th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>

</div>



<!-- MAIN CONTENT -->

<div class="content">

<h2 class="mb-4 fw-semibold">
<i class="bi bi-bar-chart"></i> Bug Reports & Analytics
</h2>


<div class="row g-4">

<!-- BUG STATUS CHART -->

<div class="col-md-6">

<div class="card p-4">

<h5 class="mb-3">Bug Status Distribution</h5>

<canvas id="statusChart"></canvas>

</div>

</div>


<!-- BUG PROJECT CHART -->

<div class="col-md-6">

<div class="card p-4">

<h5 class="mb-3">Bugs by Project</h5>

<canvas id="projectChart"></canvas>

</div>

</div>

</div>

</div>



<!-- CHART JS -->

<script th:inline="javascript">

/* BUG STATUS DATA */

const statusData = {
labels: ["OPEN","IN_PROGRESS","RESOLVED","CLOSED"],
datasets: [{
label: "Bug Status",
data: [
[[${bugsByStatus.OPEN}]],
[[${bugsByStatus.IN_PROGRESS}]],
[[${bugsByStatus.RESOLVED}]],
[[${bugsByStatus.CLOSED}]]
],
backgroundColor: [
"#ef4444",
"#3b82f6",
"#22c55e",
"#ffa500"
]
}]
};

new Chart(
document.getElementById("statusChart"),
{
type: "doughnut",
data: statusData
}
);


/* BUG PROJECT DATA */

const projectLabels = /*[[${bugsByProject.keySet()}]]*/ [];
const projectValues = /*[[${bugsByProject.values()}]]*/ [];

const projectData = {
labels: projectLabels,
datasets: [{
label: "Bugs per Project",
data: projectValues,
backgroundColor: "#6366f1"
}]
};

new Chart(
document.getElementById("projectChart"),
{
type: "bar",
data: projectData,
options:{
scales:{
y:{
beginAtZero:true
}
}
}
}
);

</script>

</body>
</html>
