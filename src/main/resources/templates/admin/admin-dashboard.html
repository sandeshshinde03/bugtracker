<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- YOUR CSS -->
    <link rel="stylesheet" th:href="@{/css/admin-style.css}">
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">
    <div class="container-fluid">

        <span class="navbar-brand">
            🐞 Bug Tracking System - Admin
        </span>

        <a href="/logout" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>
</nav>


<!-- SIDEBAR -->

<div class="sidebar">

    <h4 class="text-center mt-2">Admin Panel</h4>
    <hr>

    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/admin/users"><i class="bi bi-people"></i> Manage Users</a>
    <a href="/admin/projects"><i class="bi bi-kanban"></i> Projects</a>
    <a href="/admin/bugs"><i class="bi bi-bug"></i> All Bugs</a>
    <a href="/admin/assign"><i class="bi bi-person-check"></i> Assign Bugs</a>
    <a href="/admin/reports"><i class="bi bi-bar-chart"></i> Reports</a>

</div>


<!-- MAIN CONTENT -->

<div class="content">

<h2 class="mb-4 fw-semibold">Admin Dashboard</h2>


<!-- METRIC CARDS -->

<div class="row g-4">

    <div class="col-md-3">
        <div class="card card-metric bg-bugs shadow position-relative">
            <div class="card-body">
                <h6>Total Bugs</h6>
                <h2 th:text="${totalBugs}">120</h2>
                <i class="bi bi-bug fs-1"></i>
            </div>
        </div>
    </div>


<!--     <div class="col-md-3">
        <div class="card card-metric bg-open shadow position-relative">
            <div class="card-body">
                <h6>Open Bugs</h6>
                <h2 th:text="${openBugs}">45</h2>
                <i class="bi bi-exclamation-circle fs-1"></i>
            </div>
        </div>
    </div> -->

    <div class="col-md-3">
        <div class="card card-metric bg-critical shadow position-relative">
            <div class="card-body">
                <h6>Critical Bugs</h6>
                <h2 th:text="${criticalBugs}">15</h2>
                <i class="bi bi-fire fs-1"></i>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card card-metric bg-resolved shadow position-relative">
            <div class="card-body">
                <h6>Resolved Bugs</h6>
                <h2 th:text="${resolvedBugs}">60</h2>
                <i class="bi bi-check-circle fs-1"></i>
            </div>
        </div>
    </div>
    <div class="col-md-3">
    <div class="card card-metric shadow position-relative"
         style="background:linear-gradient(135deg,#6a11cb,#2575fc);">
        <div class="card-body">
            <h6>Closed Bugs</h6>
            <h2 th:text="${closedBugs}">20</h2>
            <i class="bi bi-lock fs-1"></i>
        </div>
    </div>
</div>



</div>



<!-- BUGS PER DEVELOPER -->

<div class="card mt-5 shadow">

<div class="card-header bg-dark text-white">
    Bugs per Developer
</div>

<div class="card-body">

<table class="table table-hover table-bordered">

<thead>

<tr>
<th>Developer</th>
<th>Total Assigned Bugs</th>
<th>Resolved</th>
<th>Closed</th>
<th>Pending</th>
</tr>

</thead>

<tbody>

<tr th:each="dev : ${developerStats}">
<td th:text="${dev.name}">John</td>
<td th:text="${dev.total}">10</td>
<td th:text="${dev.resolved}">6</td>
<td th:text="${dev.closed}">2</td>
<td th:text="${dev.pending}">4</td>
</tr>

</tbody>

</table>

</div>
</div>

</div>

</body>
</html>
