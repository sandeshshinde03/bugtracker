<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Report Bug</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- ✅ COMMON CSS -->
    <link th:href="@{/css/tester-style.css}" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->
<th:block th:replace="~{tester/layout :: navbar}"></th:block>

<!-- SIDEBAR -->
<th:block th:replace="~{tester/layout :: sidebar}"></th:block>

<!-- MAIN CONTENT -->
<div class="content">

<div class="card mx-auto" style="max-width:1000px;">
    
    <div class="card-header">
        <h4 class="mb-0">
            <i class="bi bi-bug"></i> Report New Bug
        </h4>
    </div>

    <div class="card-body">
        <form th:action="@{/tester/save-bug}" method="post" th:object="${bug}">

            <!-- TITLE -->
            <div class="mb-3">
                <label class="form-label">Bug Title</label>
                <input type="text" th:field="*{title}" class="form-control"
                       placeholder="Enter bug title" required>
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="4"
                          placeholder="Describe the issue..."></textarea>
            </div>

            <!-- PRIORITY -->
            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select th:field="*{priority}" class="form-select" required>
                    <option value="">-- Select Priority --</option>
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="HIGH">HIGH</option>
                    <option value="CRITICAL">CRITICAL</option>
                </select>
            </div>

            <!-- PROJECT -->
            <div class="mb-3">
                <label class="form-label">Project</label>
                <select name="project.id" class="form-select" required>
                    <option value="">-- Select Project --</option>
                    <option th:each="p : ${projects}"
                            th:value="${p.id}"
                            th:text="${p.name}">
                    </option>
                </select>
            </div>

            <!-- BUTTONS -->
            <div class="mt-3">
                <button type="submit" class="btn btn-glow">
    <i class="bi bi-send"></i> Submit Bug
</button>

<a th:href="@{/tester/dashboard}" class="btn btn-outline-glow ms-2">
    Cancel
</a>
            </div>

        </form>

    </div>

</div>
    </div>
</div>
</body>
</html>
