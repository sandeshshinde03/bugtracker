<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Bug Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- ✅ COMMON DARK CSS -->
    <link th:href="@{/css/tester-style.css}" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->
<th:block th:replace="~{tester/layout :: navbar}"></th:block>

<!-- SIDEBAR -->
<th:block th:replace="~{tester/layout :: sidebar}"></th:block>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- BUG DETAILS -->
    <div class="card">

        <div class="card-header">
            <h4 class="mb-0" th:text="${bug.title}">Bug Title</h4>
        </div>

        <div class="card-body">

            <p class="text-light" th:text="${bug.description}"></p>

            <div class="row mt-3">

                <!-- STATUS -->
                <div class="col-md-3">
                    <b>Status:</b><br>

                    <span th:if="${bug.status == 'OPEN'}" class="badge bg-warning">Open</span>
                    <span th:if="${bug.status == 'IN_PROGRESS'}" class="badge bg-primary">In Progress</span>
                    <span th:if="${bug.status == 'RESOLVED'}" class="badge bg-success">Resolved</span>
                    <span th:if="${bug.status == 'CLOSED'}" class="badge bg-success">Closed</span>

<div th:if="${bug.status == 'RESOLVED'}" class="mt-2 d-flex gap-2">

    <!-- CLOSE BUG -->
    <form th:action="@{'/tester/bug/' + ${bug.id} + '/status'}"
          method="post">

        <input type="hidden" name="status" value="CLOSED"/>

        <button class="btn btn-glow btn-sm">
            <i class="bi bi-check-circle"></i> Close Bug
        </button>
    </form>

    <!-- REOPEN BUG -->
    <form th:action="@{'/tester/bug/' + ${bug.id} + '/status'}"
          method="post">

        <input type="hidden" name="status" value="OPEN"/>

        <button class="btn btn-outline-glow btn-sm">
            <i class="bi bi-arrow-counterclockwise"></i> Reopen Bug
        </button>
    </form>

</div>

<!-- SHOW ONLY REOPEN when CLOSED -->
<div th:if="${bug.status == 'CLOSED'}" class="mt-2">

    <form th:action="@{'/tester/bug/' + ${bug.id} + '/status'}"
          method="post">

        <input type="hidden" name="status" value="OPEN"/>

        <button class="btn btn-outline-glow btn-sm">
            <i class="bi bi-arrow-counterclockwise"></i> Reopen Bug
        </button>
    </form>

</div>
<div th:if="${bug.status == 'OPEN' or bug.status == 'IN_PROGRESS'}" class="text-light mt-2 small">
    Can close only after resolution
</div>
                </div>

                <!-- PRIORITY -->
                <div class="col-md-3">
                    <b>Priority:</b><br>

                    <span th:if="${bug.priority == 'CRITICAL'}" class="badge priority-critical">CRITICAL</span>
                    <span th:if="${bug.priority == 'HIGH'}" class="badge priority-high">HIGH</span>
                    <span th:if="${bug.priority == 'MEDIUM'}" class="badge priority-medium">MEDIUM</span>
                    <span th:if="${bug.priority == 'LOW'}" class="badge priority-low">LOW</span>
                </div>

                <!-- PROJECT -->
                <div class="col-md-3">
                    <b>Project:</b><br>
                    <span th:text="${bug.project != null ? bug.project.name : 'No Project'}"></span>
                </div>

                <!-- ASSIGNED -->
                <div class="col-md-3">
                    <b>Assigned Developer:</b><br>
                    <span th:text="${bug.assignedDeveloper != null ? bug.assignedDeveloper.name : 'Unassigned'}"></span>
                </div>

            </div>

            <div class="mt-3">
                <b>Created:</b>
                <span th:text="${#temporals.format(bug.createdDate, 'dd MMM yyyy HH:mm')}"></span>
            </div>

        </div>

    </div>

    <!-- COMMENTS -->
    <div class="card mt-4">

        <div class="card-header">
            <h5 class="mb-0">Comments</h5>
        </div>

        <div class="card-body">

            <div th:if="${#lists.isEmpty(comments)}" class="text-light">
                No comments yet 💬
            </div>

            <div th:each="c : ${comments}" class="mb-3 p-3"
                 style="background:rgba(255,255,255,0.03); border-radius:10px; border:1px solid rgba(255,255,255,0.05);">

                <b class="text-white" th:text="${c.user.name}">User</b>

                <!-- ✅ FIXED -->
                <small class="text-secondary ms-2"
                       th:text="${#temporals.format(c.createdDate, 'dd MMM yyyy HH:mm')}"></small>

                <div class="mt-1 text-light" th:text="${c.message}"></div>
            </div>

            <form th:action="@{'/tester/bug/' + ${bug.id} + '/comment'}" method="post" class="mt-3">

                <div class="input-group">

                    <input type="text"
                           name="message"
                           class="form-control"
                           placeholder="Add a comment..."
                           required>

                    <button class="btn btn-glow">
                        <i class="bi bi-send"></i>
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
