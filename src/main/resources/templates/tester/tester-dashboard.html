<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Tester Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Common CSS -->
    <link th:href="@{/css/tester-style.css}" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<!-- NAVBAR -->
<th:block th:replace="~{tester/layout :: navbar}"></th:block>

<!-- SIDEBAR -->
<th:block th:replace="~{tester/layout :: sidebar}"></th:block>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- STATS -->
<div class="row mb-4 g-3">

    <div class="col-md-3">
        <div class="dashboard-card card-assigned text-center h-100">
            <i class="bi bi-bug"></i>
            <h5>Total Bugs</h5>
            <h2 th:text="${totalBugs}">0</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card card-progress text-center h-100">
            <i class="bi bi-tools"></i>
            <h5>In Progress</h5>
            <h2 th:text="${inProgressBugs}">0</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card card-resolved text-center h-100">
            <i class="bi bi-check-circle"></i>
            <h5>Resolved</h5>
            <h2 th:text="${resolvedBugs}">0</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="dashboard-card card-resolved text-center h-100">
            <i class="bi bi-lock"></i>
            <h5>Closed</h5>
            <h2 th:text="${closedBugs}">0</h2>
        </div>
    </div>

</div>

    <!-- BUTTON -->
    <div class="mb-3">
        <a th:href="@{/tester/report-bug}" class="btn btn-glow">
            <i class="bi bi-plus-circle"></i> Report New Bug
        </a>
    </div>

    <!-- TABLE -->
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">My Reported Bugs</h5>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Project</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Created</th>
                </tr>
            </thead>

            <tbody>

                <tr th:if="${#lists.isEmpty(bugs)}">
                    <td colspan="6" class="text-center text-muted">
                        No bugs reported yet 🐞
                    </td>
                </tr>

                <tr th:each="bug : ${bugs}"
                    th:onclick="'window.location.href=\'/tester/bug/' + ${bug.id} + '\''"
                    style="cursor:pointer;">

                    <td th:text="${bug.id}"></td>

                    <td th:text="${bug.title}"></td>

                    <td th:text="${bug.project != null ? bug.project.name : 'No Project'}"></td>

                    <!-- STATUS -->
                    <td>
                        <span th:if="${bug.status == 'OPEN'}" class="badge bg-warning">Open</span>
                        <span th:if="${bug.status == 'IN_PROGRESS'}" class="badge bg-primary">In Progress</span>
                        <span th:if="${bug.status == 'RESOLVED'}" class="badge bg-success">Resolved</span>
                        <span th:if="${bug.status == 'CLOSED'}" class="badge bg-success">Closed</span>
                    </td>

                    <!-- PRIORITY -->
                    <td>
                        <span th:if="${bug.priority == 'CRITICAL'}" class="badge priority-critical">CRITICAL</span>
                        <span th:if="${bug.priority == 'HIGH'}" class="badge priority-high">HIGH</span>
                        <span th:if="${bug.priority == 'MEDIUM'}" class="badge priority-medium">MEDIUM</span>
                        <span th:if="${bug.priority == 'LOW'}" class="badge priority-low">LOW</span>
                    </td>

                    <td th:text="${#temporals.format(bug.createdDate, 'dd MMM yyyy HH:mm')}"></td>

                </tr>

            </tbody>

        </table>
    </div>
</div>

</div>

</body>
</html>
